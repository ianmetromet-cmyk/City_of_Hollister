        /* High-Impact Color Palette */
        :root {
            --electric-purple: #5b0bb5;
            --alert-yellow: #FFDE00;
            --heavy-black: #090909;
            --pure-white: #ffffff;
            --bg-gray: #f0f0f0;
        }

        /* Global Styles */
        body {
            font-family: 'Arial Black', Impact, 'Segoe UI Black', sans-serif;
            line-height: 1.5;
            color: var(--heavy-black);
            margin: 0;
            padding: 0;
            background-color: var(--bg-gray);
            background-image: radial-gradient(#d5d5d5 1px, transparent 0);
            background-size: 20px 20px;
        }

        h1, h2, h3 {
            line-height: 1.1;
            margin-top: 0;
            text-transform: uppercase;
        }

        p, li {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 600;
        }

        /* Header Section - Bold & Aggressive */
        header {
            background-color: var(--pure-white);
            color: var(--heavy-black);
            text-align: center;
            padding: 3rem 1rem;
            border-bottom: 8px solid var(--heavy-black);
        }

        .pre-header {
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 5px;
            color: var(--heavy-black);
            text-transform: uppercase;
            text-shadow: 4px 4px 0px var(--alert-yellow);
            line-height: 1;
        }

        header h1 {
            margin: 0;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            letter-spacing: 0px;
            text-shadow: none;
            font-weight: 800;
        }

        .subtitle {
            background-color: var(--heavy-black);
            color: var(--alert-yellow);
            display: inline-block;
            padding: 10px 25px;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            margin-top: 20px;
            transform: rotate(-2deg);
            box-shadow: 4px 4px 0px var(--electric-purple);
        }

        /* Centered Single-Column Layout */
        .layout-wrapper {
            max-width: 900px; /* Restricts the page to a nice, readable width */
            margin: 3rem auto;
            padding: 0 1.5rem;
            display: flex;
            flex-direction: column; 
            gap: 3rem;
            align-items: center;
        }

        .content-block {
            width: 100%;
        }

        /* Department Photo Grid */
        .photo-banner {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 3rem;
        }

        .photo-banner figure {
            margin: 0;
            position: relative;
            border: 4px solid var(--heavy-black);
            box-shadow: 5px 5px 0px var(--heavy-black);
            background: var(--pure-white);
            transition: transform 0.2s;
        }

        .photo-banner figure:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px var(--electric-purple);
        }

        .photo-banner img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
        }

        .photo-banner figcaption {
            background: var(--alert-yellow);
            color: var(--heavy-black);
            font-size: 0.9rem;
            text-align: center;
            padding: 8px 0;
            font-weight: 900;
            border-top: 4px solid var(--heavy-black);
            text-transform: uppercase;
        }

        /* Text Cards - Brutalist Style */
        .card {
            background: var(--pure-white);
            padding: 2.5rem;
            border: 5px solid var(--heavy-black);
            box-shadow: 8px 8px 0px var(--heavy-black);
            margin-bottom: 2.5rem;
        }

        .intro-text p {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
        }

        .highlight-text {
            background-color: var(--electric-purple);
            color: var(--pure-white);
            padding: 2px 8px;
            font-size: 1.4rem;
            display: inline;
        }

        .issues-box {
            background-color: var(--pure-white);
            color: var(--heavy-black);
            border: 5px solid var(--heavy-black);
            box-shadow: 8px 8px 0px var(--electric-purple);
            padding: 2.5rem;
            margin-bottom: 2.5rem;
        }

        .issues-box h2 {
            color: var(--electric-purple);
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
        }

        }

        .issues-list li {
            margin-bottom: 1.5rem;
        }

        .issues-list strong {

            text-transform: uppercase;

        }

        }

            width: 100%;
            display: block;
        }
